[build]
  # Gate: sanity-test runs on every Netlify build — fail fast before deploy
  # Local equivalent: just sanity-test-local (node scripts/sanity-test.mjs --local)
  # Cost: $0 — no cloud calls, runs against built dist/
  command = "npm run build && node scripts/sanity-test.mjs --local"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--include=dev"

[dev]
  command = "npx vite"
  port = 8888
  targetPort = 3000
  autoLaunch = false

# Production context
[context.production]
  environment = { NODE_ENV = "production" }

# Deploy preview context
[context.deploy-preview]
  environment = { NODE_ENV = "preview" }

# Functions configuration
[functions]
  node_bundler = "esbuild"

# Extended timeout for video processing (26s background limit)
[functions."compile-video"]
  timeout = 26

# Background function for pipeline orchestration
[functions."run-pipeline-background"]
  timeout = 900

# LinkedIn OAuth callback → serverless function
[[redirects]]
  from = "/auth/linkedin/callback"
  to = "/.netlify/functions/auth-linkedin-callback"
  status = 200

# SPA fallback redirect
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
